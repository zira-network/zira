<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./zira-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="ZIRA Console. A shared AI network that people run together. Your keys, your wallet, models running on participants' own machines." />
    <title>ZIRA Console</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Set the theme before first paint to avoid a flash. Defaults to dark, matching the shell.
      (function () {
        try {
          var t = localStorage.getItem("zira.theme");
          document.documentElement.dataset.theme = (t === "light" || t === "dark") ? t : "dark";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
